name: "SA20 Pack"
description: "Run the public sa20-pack SQLAlchemy fit scanner"

inputs:
  path:
    description: "Path to the target repository or package"
    required: false
    default: "."
  apply:
    description: "Compatibility-only. Ignored because the public action is scan-only."
    required: false
    default: "false"
  diff:
    description: "Compatibility-only. The public scanner does not emit file diffs."
    required: false
    default: "false"
  report-path:
    description: "Path to the JSON migration report"
    required: false
    default: "migration-report.json"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - shell: pwsh
      run: python -m pip install '.[dev]'
    - shell: pwsh
      run: |
        $args = @("${{ inputs.path }}", "--report", "${{ inputs.report-path }}")
        if ("${{ inputs.apply }}" -eq "true") {
          Write-Warning "apply=true is ignored because the public action is scan-only."
        }
        if ("${{ inputs.diff }}" -eq "true") { $args += "--diff" }
        python -m sa20_pack.cli @args
