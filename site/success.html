<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#08111f" />
    <title>Purchase received | sa20-pack</title>
    <meta name="robots" content="noindex,follow" />
    <link
      rel="canonical"
      href="https://zippertools.org/success"
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="wrap">
      <section class="page-title">
        <p class="kicker">Success</p>
        <h1>Purchase received.</h1>
        <p>
          Stripe confirmed the checkout. Use the delivery button to open the
          purchased software bundle after the payment session is verified.
        </p>
        <div class="actions">
          <a class="button" id="delivery-link" href="/pricing">Open delivery</a>
          <a class="button secondary" href="/">Back to home</a>
          <a class="button secondary" href="#" data-contact-link>Contact support</a>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var sessionId = params.get("session_id");
        var link = document.getElementById("delivery-link");
        if (!link || !sessionId) {
          return;
        }
        link.href = "/stripe/delivery?session_id=" + encodeURIComponent(sessionId);
      })();
    </script>
  </body>
</html>
